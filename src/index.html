<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WimyViewer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: #1a1a1a;
      color: #ccc;
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
      user-select: none;
    }

    /* 툴바 */
    #toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      background: #2a2a2a;
      border-bottom: 1px solid #3a3a3a;
      flex-shrink: 0;
    }

    #open-folder {
      padding: 4px 14px;
      background: #3a3a3a;
      color: #ddd;
      border: 1px solid #555;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }

    #open-folder:hover {
      background: #4a4a4a;
    }

    /* 캔버스 영역 */
    #canvas-container {
      flex: 1;
      overflow: auto;
      position: relative;
    }

    #canvas-container::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    #canvas-container::-webkit-scrollbar-track {
      background: #1a1a1a;
    }

    #canvas-container::-webkit-scrollbar-thumb {
      background: #555;
      border-radius: 4px;
    }

    #canvas-container::-webkit-scrollbar-thumb:hover {
      background: #777;
    }

    #canvas-inner {
      position: relative;
    }

    #viewer {
      position: absolute;
      transform-origin: top left;
      display: block;
      image-rendering: pixelated;
    }

    /* 로딩 스피너 */
    #spinner {
      display: none;
      position: absolute;
      inset: 0;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.4);
    }

    .spinner-ring {
      width: 48px;
      height: 48px;
      border: 5px solid #555;
      border-top-color: #aaa;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* 상태바 */
    #status-bar {
      padding: 4px 12px;
      background: #2a2a2a;
      border-top: 1px solid #3a3a3a;
      font-size: 12px;
      color: #999;
      flex-shrink: 0;
    }

    /* 공통 다이얼로그 */
    dialog {
      background: #2c2c2c;
      color: #ddd;
      border: 1px solid #555;
      border-radius: 8px;
      padding: 24px;
      min-width: 320px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    }

    dialog::backdrop {
      background: rgba(0, 0, 0, 0.5);
    }

    dialog h3 {
      margin-bottom: 12px;
      font-size: 15px;
      font-weight: 600;
    }

    dialog p {
      margin-bottom: 20px;
      font-size: 13px;
      color: #aaa;
      word-break: break-all;
    }

    dialog input[type="text"] {
      width: 100%;
      padding: 6px 10px;
      background: #1a1a1a;
      color: #ddd;
      border: 1px solid #555;
      border-radius: 4px;
      font-size: 13px;
      margin-bottom: 16px;
      outline: none;
    }

    dialog input[type="text"]:focus {
      border-color: #888;
    }

    .dialog-buttons {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .dialog-buttons button {
      padding: 5px 16px;
      border-radius: 4px;
      border: 1px solid #555;
      cursor: pointer;
      font-size: 13px;
    }

    .btn-confirm {
      background: #c0392b;
      color: #fff;
      border-color: #922b21;
    }

    .btn-confirm:hover {
      background: #e74c3c;
    }

    .btn-cancel {
      background: #3a3a3a;
      color: #ccc;
    }

    .btn-cancel:hover {
      background: #4a4a4a;
    }

    #rename-confirm {
      background: #2980b9;
      color: #fff;
      border-color: #1a6a9a;
    }

    #rename-confirm:hover {
      background: #3498db;
    }
  </style>
</head>
<body>

  <!-- 툴바 -->
  <div id="toolbar">
    <button id="open-folder">폴더 열기</button>
  </div>

  <!-- 이미지 표시 영역 -->
  <div id="canvas-container">
    <div id="canvas-inner">
      <canvas id="viewer"></canvas>
    </div>
    <div id="spinner">
      <div class="spinner-ring"></div>
    </div>
  </div>

  <!-- 상태바 -->
  <div id="status-bar">폴더를 열어 이미지를 불러오세요.</div>

  <!-- 삭제 확인 팝업 -->
  <dialog id="delete-dialog">
    <h3>파일 삭제</h3>
    <p>아래 파일을 삭제하시겠습니까?<br><strong id="delete-filename"></strong></p>
    <div class="dialog-buttons">
      <button class="btn-cancel" id="delete-cancel">취소</button>
      <button class="btn-confirm" id="delete-confirm">삭제</button>
    </div>
  </dialog>

  <!-- 이름 변경 팝업 -->
  <dialog id="rename-dialog">
    <h3>파일 이름 변경</h3>
    <input type="text" id="rename-input" autocomplete="off" spellcheck="false" />
    <div class="dialog-buttons">
      <button class="btn-cancel" id="rename-cancel">취소</button>
      <button id="rename-confirm">변경</button>
    </div>
  </dialog>

  <script type="module" src="./main.js"></script>
</body>
</html>
