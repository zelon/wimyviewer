<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WimyViewer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: #0d0d0f;
      color: #e0e0e0;
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      overflow: hidden;
      user-select: none;
    }

    /* ── 툴바 ── */
    #toolbar {
      display: flex;
      align-items: center;
      height: 36px;
      padding: 0 12px;
      background: #111114;
      border-bottom: 1px solid #1e1e24;
      flex-shrink: 0;
      gap: 4px;
    }

    .app-title {
      font-size: 11px;
      font-weight: 700;
      color: #444;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      flex: 1;
    }

    .toolbar-actions {
      display: flex;
      align-items: center;
      gap: 2px;
    }

    .tool-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 26px;
      padding: 0 10px;
      background: none;
      border: none;
      border-radius: 6px;
      color: #666;
      cursor: pointer;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.04em;
      transition: background 0.15s, color 0.15s;
    }

    .tool-btn:hover {
      background: #1e1e28;
      color: #ddd;
    }

    .tool-btn.active {
      color: #7c8dfa;
      background: rgba(92, 107, 250, 0.12);
    }

    .toolbar-sep {
      width: 1px;
      height: 14px;
      background: #222228;
      margin: 0 4px;
    }

    /* ── 윈도우 컨트롤 버튼 ── */
    .win-controls {
      display: flex;
      align-items: center;
      margin-left: 8px;
    }

    .win-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 36px;
      background: none;
      border: none;
      color: #555;
      cursor: pointer;
      font-size: 10px;
      transition: background 0.15s, color 0.15s;
    }

    .win-btn svg {
      width: 10px;
      height: 10px;
      fill: currentColor;
    }

    .win-btn:hover {
      background: #1e1e28;
      color: #ccc;
    }

    #win-close:hover {
      background: #c0392b;
      color: #fff;
    }

    /* ── 캔버스 영역 ── */
    #canvas-container {
      flex: 1;
      overflow: auto;
      position: relative;
    }

    #canvas-container::-webkit-scrollbar {
      width: 5px;
      height: 5px;
    }

    #canvas-container::-webkit-scrollbar-track {
      background: transparent;
    }

    #canvas-container::-webkit-scrollbar-thumb {
      background: #222228;
      border-radius: 3px;
    }

    #canvas-container::-webkit-scrollbar-thumb:hover {
      background: #33333e;
    }

    #canvas-inner {
      position: relative;
    }

    #viewer {
      position: absolute;
      transform-origin: top left;
      display: block;
      image-rendering: pixelated;
    }

    /* ── 네비게이션 화살표 ── */
    .nav-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 36px;
      height: 64px;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      color: rgba(255, 255, 255, 0.35);
      font-size: 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.2s, background 0.15s, color 0.15s, border-color 0.15s;
      z-index: 10;
      backdrop-filter: blur(4px);
      line-height: 1;
    }

    #nav-prev { left: 12px; }
    #nav-next { right: 12px; }

    #canvas-container:hover .nav-arrow {
      opacity: 1;
    }

    .nav-arrow:hover {
      background: rgba(92, 107, 250, 0.22);
      color: #fff;
      border-color: rgba(92, 107, 250, 0.35);
    }

    /* ── 로딩 스피너 ── */
    #spinner {
      display: none;
      position: absolute;
      inset: 0;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .spinner-ring {
      width: 34px;
      height: 34px;
      border: 3px solid #1e1e24;
      border-top-color: #5b6af5;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── 상태바 ── */
    #status-bar {
      background: #111114;
      border-top: 1px solid #1e1e24;
      flex-shrink: 0;
    }

    .status-progress-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 14px 3px;
    }

    #progress-slider {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 2px;
      background: #222228;
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }

    #progress-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #5b6af5;
      cursor: pointer;
      transition: transform 0.12s;
    }

    #progress-slider:hover::-webkit-slider-thumb {
      transform: scale(1.4);
    }

    #status-counter {
      font-size: 11px;
      color: #444;
      white-space: nowrap;
      min-width: 50px;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .status-info-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 2px 14px 6px;
    }

    #status-filename {
      font-size: 11px;
      color: #666;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #status-zoom {
      font-size: 11px;
      color: #444;
      white-space: nowrap;
      flex-shrink: 0;
      margin-left: 12px;
    }

    /* ── 다이얼로그 ── */
    dialog {
      background: #16161b;
      color: #e0e0e0;
      border: 1px solid #252530;
      border-radius: 12px;
      padding: 24px;
      min-width: 340px;
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.85);
    }

    dialog::backdrop {
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(6px);
    }

    dialog h3 {
      margin-bottom: 10px;
      font-size: 14px;
      font-weight: 600;
    }

    dialog p {
      margin-bottom: 20px;
      font-size: 13px;
      color: #666;
      word-break: break-all;
      line-height: 1.6;
    }

    dialog input[type="text"] {
      flex: 1;
      padding: 8px 12px;
      background: #0d0d0f;
      color: #e0e0e0;
      border: 1px solid #252530;
      border-radius: 8px;
      font-size: 13px;
      outline: none;
      min-width: 0;
      transition: border-color 0.15s;
    }

    dialog input[type="text"]:focus {
      border-color: #5b6af5;
    }

    .rename-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 20px;
    }

    #rename-ext {
      font-size: 13px;
      color: #444;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .dialog-buttons {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .dialog-buttons button {
      padding: 7px 18px;
      border-radius: 8px;
      border: 1px solid transparent;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: background 0.15s;
    }

    .btn-confirm {
      background: #c0392b;
      color: #fff;
    }

    .btn-confirm:hover {
      background: #e74c3c;
    }

    .btn-cancel {
      background: transparent;
      color: #777;
      border-color: #252530;
    }

    .btn-cancel:hover {
      background: #1e1e28;
      color: #ccc;
    }

    #rename-confirm {
      background: #5b6af5;
      color: #fff;
    }

    #rename-confirm:hover {
      background: #6c7dff;
    }

    /* ── 컨텍스트 메뉴 ── */
    #context-menu {
      display: none;
      position: fixed;
      background: #16161b;
      border: 1px solid #252530;
      border-radius: 10px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.75);
      z-index: 1000;
      min-width: 180px;
      padding: 5px;
    }

    #context-menu button {
      display: block;
      width: 100%;
      padding: 8px 12px;
      background: none;
      border: none;
      border-radius: 6px;
      color: #ccc;
      font-size: 13px;
      text-align: left;
      cursor: pointer;
      transition: background 0.1s;
    }

    #context-menu button:hover {
      background: #1e1e28;
    }
  </style>
</head>
<body>

  <!-- 툴바 -->
  <div id="toolbar" data-tauri-drag-region>
    <span class="app-title" data-tauri-drag-region>WimyViewer</span>
    <div class="toolbar-actions">
      <button id="open-folder" class="tool-btn" title="파일 열기">열기</button>
      <div class="toolbar-sep"></div>
      <button id="zoom-actual" class="tool-btn" title="실제 크기 (1)">1:1</button>
      <button id="zoom-fit" class="tool-btn" title="화면 맞춤 (0)">Fit</button>
    </div>
    <div class="win-controls">
      <button id="win-minimize" class="win-btn" title="최소화">
        <svg viewBox="0 0 10 1"><rect width="10" height="1"/></svg>
      </button>
      <button id="win-maximize" class="win-btn" title="최대화">
        <svg viewBox="0 0 10 10"><rect x="0.5" y="0.5" width="9" height="9" fill="none" stroke="currentColor" stroke-width="1"/></svg>
      </button>
      <button id="win-close" class="win-btn" title="닫기">
        <svg viewBox="0 0 10 10"><line x1="0" y1="0" x2="10" y2="10" stroke="currentColor" stroke-width="1.2"/><line x1="10" y1="0" x2="0" y2="10" stroke="currentColor" stroke-width="1.2"/></svg>
      </button>
    </div>
  </div>

  <!-- 이미지 표시 영역 -->
  <div id="canvas-container">
    <div id="canvas-inner">
      <canvas id="viewer"></canvas>
    </div>
    <div id="spinner">
      <div class="spinner-ring"></div>
    </div>
    <button id="nav-prev" class="nav-arrow">&#8249;</button>
    <button id="nav-next" class="nav-arrow">&#8250;</button>
  </div>

  <!-- 상태바 -->
  <div id="status-bar">
    <div class="status-progress-row">
      <input type="range" id="progress-slider" min="0" max="0" value="0" />
      <span id="status-counter">—</span>
    </div>
    <div class="status-info-row">
      <span id="status-filename">폴더를 열어 이미지를 불러오세요.</span>
      <span id="status-zoom"></span>
    </div>
  </div>

  <!-- 삭제 확인 팝업 -->
  <dialog id="delete-dialog">
    <h3>파일 삭제</h3>
    <p>아래 파일을 삭제하시겠습니까?<br><strong id="delete-filename"></strong></p>
    <div class="dialog-buttons">
      <button class="btn-cancel" id="delete-cancel">취소</button>
      <button class="btn-confirm" id="delete-confirm">삭제</button>
    </div>
  </dialog>

  <!-- 이름 변경 팝업 -->
  <dialog id="rename-dialog">
    <h3>파일 이름 변경</h3>
    <div class="rename-row">
      <input type="text" id="rename-input" autocomplete="off" spellcheck="false" />
      <span id="rename-ext"></span>
    </div>
    <div class="dialog-buttons">
      <button class="btn-cancel" id="rename-cancel">취소</button>
      <button id="rename-confirm">변경</button>
    </div>
  </dialog>

  <!-- 우클릭 컨텍스트 메뉴 -->
  <div id="context-menu">
    <button id="ctx-show-in-explorer">탐색기에서 보기</button>
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
